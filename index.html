<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Service | Платежник</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F5F9F8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1E5A48, #2E8B6F);
            color: white;
            padding: 24px;
            border-radius: 32px;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 24px;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #2E8B6F;
        }
        .stat-label {
            font-size: 12px;
            color: #8BA9A2;
            margin-top: 4px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab {
            background: white;
            border: 1px solid #E2EFEC;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab.active {
            background: #2E8B6F;
            color: white;
            border-color: #2E8B6F;
        }
        .order-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 12px;
            border-left: 4px solid #FFB74D;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .order-card.paid {
            border-left-color: #4CAF50;
            opacity: 0.7;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
            background: #FFF3E0;
            color: #FF9800;
        }
        .badge.paid {
            background: #E8F5E9;
            color: #4CAF50;
        }
        .order-number {
            font-size: 15px;
            font-weight: 700;
            font-family: monospace;
            margin-bottom: 8px;
            color: #1E3A32;
        }
        .order-details {
            font-size: 13px;
            color: #6B8A82;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .order-amount {
            font-size: 20px;
            font-weight: 800;
            color: #2E8B6F;
            margin-bottom: 12px;
        }
        .btn {
            background: #2E8B6F;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn:active { transform: scale(0.97); }
        .refresh-btn {
            background: white;
            color: #1E3A32;
            border: 1px solid #E2EFEC;
            width: 100%;
            margin-bottom: 16px;
            padding: 12px;
        }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #8BA9A2;
            background: white;
            border-radius: 32px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💳 Платежник</h1>
        <p style="font-size: 14px; opacity: 0.8; margin-top: 6px;">Подтверждение оплат eSIM</p>
    </div>
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Ожидают оплаты</div></div>
        <div class="stat-card"><div class="stat-number" id="paidCount">0</div><div class="stat-label">Подтверждены</div></div>
    </div>
    <div class="tabs">
        <button class="tab active" data-filter="pending">⏳ Ожидают</button>
        <button class="tab" data-filter="paid">✅ Подтверждены</button>
        <button class="tab" data-filter="all">📋 Все заказы</button>
    </div>
    <button class="btn refresh-btn" id="refreshBtn">🔄 Обновить</button>
    <div id="ordersList"></div>
</div>

<script>
    const SUPABASE_URL = 'https://domtiusbwjbxbfkygwvx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvbXRpdXNid2pieGJma3lnd3Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTAxMjgsImV4cCI6MjA5MDUyNjEyOH0.GlYbpkx1tWUqJ2kwrOHFH5f7EaklBcuXHz8W0U-YGWg';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentFilter = 'pending';
    let orders = [];
    
    async function loadOrders() {
        const { data, error } = await supabase
            .from('orders')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) return;
        orders = data;
        
        document.getElementById('pendingCount').innerText = orders.filter(o => o.status === 'pending').length;
        document.getElementById('paidCount').innerText = orders.filter(o => o.status === 'paid').length;
        
        let filtered = orders;
        if (currentFilter === 'pending') filtered = orders.filter(o => o.status === 'pending');
        if (currentFilter === 'paid') filtered = orders.filter(o => o.status === 'paid');
        
        const container = document.getElementById('ordersList');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty">📭 Нет заказов</div>';
            return;
        }
        
        container.innerHTML = filtered.map(order => `
            <div class="order-card ${order.status === 'paid' ? 'paid' : ''}">
                <div class="badge ${order.status === 'paid' ? 'paid' : ''}">
                    ${order.status === 'pending' ? '⏳ Ожидает оплаты' : '✅ Оплата подтверждена'}
                </div>
                <div class="order-number">${order.order_number}</div>
                <div class="order-details">
                    ${order.tariff_name}<br>
                    ${order.email}<br>
                    ${new Date(order.created_at).toLocaleString()}
                </div>
                <div class="order-amount">${order.total_amount} ₽</div>
                ${order.status === 'pending' ? 
                    `<button class="btn" onclick="confirmPayment('${order.id}')">✅ Подтвердить оплату</button>` : 
                    '<span style="color:#4CAF50; font-size:13px;">✓ Оплата подтверждена</span>'}
            </div>
        `).join('');
    }
    
    window.confirmPayment = async (id) => {
        if (!confirm('Подтвердить оплату заказа?')) return;
        const { error } = await supabase
            .from('orders')
            .update({ status: 'paid', updated_at: new Date() })
            .eq('id', id);
        if (!error) {
            showAlert('✅ Оплата подтверждена!');
            loadOrders();
        } else {
            showAlert('Ошибка');
        }
    };
    
    function showAlert(msg) {
        alert(msg);
    }
    
    document.getElementById('refreshBtn').onclick = loadOrders;
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            loadOrders();
        };
    });
    
    loadOrders();
    setInterval(loadOrders, 5000);
</script>
</body>
</html>
